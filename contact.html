<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Me - Portfolio</title>
    <link rel="stylesheet" href="CSS/contact.css" />
  </head>
  <script
    type="text/javascript"
    src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"
  ></script>
  <script type="text/javascript">
    (function () {
      // 🌟 1단계에서 복사한 본인의 Public Key를 여기에 넣으세요!
      emailjs.init("E1FiY3GF9-5kXBXbT");
    })();
  </script>
  <body>
    <header>
      <div class="container">
        <h1><a href="index.html" class="logo">My Portfolio</a></h1>
        <nav>
          <a href="index.html">Home</a>
          <a href="about.html">About</a>
          <a href="projects.html">Projects</a>
          <a href="contact.html" class="active">Contact</a>
        </nav>
      </div>
    </header>

    <main class="contact-page">
      <section class="contact">
        <div class="container">
          <div class="contact-box">
            <h2>Contact Me</h2>
            <p class="contact-subtitle">
              함께 멋진 프로젝트를 만들어가고 싶다면
              <br class="mobile-break" /><span>언제든 연락주세요!</span>
              <br />
              (주의! 이메일은 꼭 @gmail.com형식이어야 함!!)
            </p>

            <form id="contact-form">
              <div class="input-group">
                <input type="text" id="name" placeholder="이름" required />
                <input type="email" id="email" placeholder="이메일" required />
              </div>
              <textarea
                id="message"
                placeholder="메시지를 입력해주세요..."
                rows="5"
                required
              ></textarea>
              <button type="submit">
                <span>Message Send</span>
                <svg
                  class="send-icon"
                  viewBox="0 0 24 24"
                  width="24"
                  height="24"
                >
                  <path fill="currentColor" d="M2 21l21-9L2 3v7l15 2-15 2v7z" />
                </svg>
              </button>
            </form>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Portfolio. All rights reserved.</p>
    </footer>

    <script src="JS/contact.js"></script>
  </body>
</html>
